# Production : images pré-construites depuis Docker Hub (pas de build local)
# Usage sur le serveur :
#   BACKEND_IMAGE=user/edusmart-backend:latest \
#   FRONTEND_IMAGE=user/edusmart-frontend:latest \
#   docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE}
    container_name: edusmart_backend
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-edusmartcm_db}
      DB_USERNAME: ${DB_USERNAME:-edusmart}
      DB_PASSWORD: ${DB_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage/app
    networks:
      - edusmart_net

  frontend:
    image: ${FRONTEND_IMAGE:?Set FRONTEND_IMAGE}
    container_name: edusmart_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - edusmart_net

  db:
    image: mysql:8.0
    container_name: edusmart_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-edusmartcm_db}
      MYSQL_USER: ${DB_USERNAME:-edusmart}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edusmart_net

volumes:
  db_data:
  storage_data:

networks:
  edusmart_net:
    driver: bridge
