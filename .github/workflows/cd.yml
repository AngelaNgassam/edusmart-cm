# Déploiement SSH sur serveur (optionnel)
# Activez avec la variable ENABLE_SSH_DEPLOY=true dans GitHub → Settings → Secrets and variables → Actions → Variables

name: CD — Deploy to Server

on:
  workflow_run:
    workflows: ["Docker Hub — Build & Push"]
    types: [completed]
    branches: [main, staging]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      vars.ENABLE_SSH_DEPLOY == 'true'

    environment:
      name: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image tag
        id: meta
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_SSH_HOST || secrets.STAGING_SSH_HOST }}
          username: ${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_SSH_USER || secrets.STAGING_SSH_USER }}
          key: ${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_SSH_KEY || secrets.STAGING_SSH_KEY }}
          port: ${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_SSH_PORT || secrets.STAGING_SSH_PORT || 22 }}
          source: "docker-compose.prod.yml"
          target: ${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_APP_PATH || secrets.STAGING_APP_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_SSH_HOST || secrets.STAGING_SSH_HOST }}
          username: ${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_SSH_USER || secrets.STAGING_SSH_USER }}
          key: ${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_SSH_KEY || secrets.STAGING_SSH_KEY }}
          port: ${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_SSH_PORT || secrets.STAGING_SSH_PORT || 22 }}
          script: |
            set -e

            APP_PATH="${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_APP_PATH || secrets.STAGING_APP_PATH }}"
            IMAGE_TAG="${{ steps.meta.outputs.tag }}"
            DOCKER_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

            cd $APP_PATH

            echo "→ Login Docker Hub"
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "$DOCKER_USERNAME" --password-stdin

            echo "→ Pull nouvelles images"
            docker pull $DOCKER_USERNAME/edusmart-backend:$IMAGE_TAG
            docker pull $DOCKER_USERNAME/edusmart-frontend:$IMAGE_TAG

            echo "→ Mise à jour des variables d'environnement"
            cat > .env << 'ENVEOF'
            APP_KEY=${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_APP_KEY || secrets.STAGING_APP_KEY }}
            APP_URL=${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_APP_URL || secrets.STAGING_APP_URL }}
            FRONTEND_URL=${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_FRONTEND_URL || secrets.STAGING_FRONTEND_URL }}
            VITE_API_URL=${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_VITE_API_URL || secrets.STAGING_VITE_API_URL }}
            DB_DATABASE=${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_DB_DATABASE || secrets.STAGING_DB_DATABASE }}
            DB_USERNAME=${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_DB_USERNAME || secrets.STAGING_DB_USERNAME }}
            DB_PASSWORD=${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_DB_PASSWORD || secrets.STAGING_DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ github.event.workflow_run.head_branch == 'main' && secrets.PROD_DB_ROOT_PASSWORD || secrets.STAGING_DB_ROOT_PASSWORD }}
            ENVEOF

            echo "→ Redémarrage des containers"
            BACKEND_IMAGE=$DOCKER_USERNAME/edusmart-backend:$IMAGE_TAG \
            FRONTEND_IMAGE=$DOCKER_USERNAME/edusmart-frontend:$IMAGE_TAG \
            docker compose -f docker-compose.prod.yml up -d --no-build

            echo "→ Migrations Laravel"
            docker compose -f docker-compose.prod.yml exec -T backend php artisan migrate --force

            echo "→ Cache Laravel"
            docker compose -f docker-compose.prod.yml exec -T backend php artisan config:cache
            docker compose -f docker-compose.prod.yml exec -T backend php artisan route:cache
            docker compose -f docker-compose.prod.yml exec -T backend php artisan view:cache

            echo "→ Nettoyage images obsolètes"
            docker image prune -f

            echo "✅ Déploiement terminé"
